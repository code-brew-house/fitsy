<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitsy — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans Variable', system-ui, -apple-system, sans-serif;
      background: #F8F9FC;
      color: #2D3436;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #6C5CE7;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #2D3436;
    }
    p {
      color: #636E72;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      background: #6C5CE7;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button:active { transform: scale(0.97); }
    @media (prefers-color-scheme: dark) {
      body { background: #1A1B2E; color: #F5F6FA; }
      h1 { color: #F5F6FA; }
      p { color: #A4A6B8; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — your fitness streak is safe! Reconnect and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
